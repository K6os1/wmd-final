<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .slideshow-container {
            position: relative;
            max-width: 1000px;
            margin: auto;
        }

        .mySlides {
            display: none;
        }

        .mySlides img {
            width: 100%;
            height: auto;
        }

        .prev, .next {
            position: absolute;
            top: 50%;
            padding: 16px;
            color: white;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            background-color: rgba(0,0,0,0.5);
            border-radius: 3px;
        }

        .next {
            right: 0;
        }

        .prev:hover, .next:hover {
            background-color: rgba(0,0,0,0.8);
        }

        .fade {
            animation: fade 1s;
        }

        @keyframes fade {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        figure {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        figcaption {
            margin-top: 5px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 15px;
            align-items: center;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav id="Navigation">
        <ul>
            <li><a href="movies.html">Movies</a></li>
            <li><a href="tvshows.html">TV Shows</a></li>
            <li><a href="games.html">Games and Apps</a></li>
            <li><a href="collections.html">Collections</a></li>
            <li><a href="feedback.html">Feedback</a></li>
            <li>
                <a href="index.html">
                    <img src="logo.png" alt="Warner logo" height="30">
                </a>
            </li>
        </ul>
    </nav>

    <!-- Slideshow -->
    <div class="slideshow-container">
        <div class="mySlides fade">
            <img src="adultswim1.jpeg">
        </div>

        <div class="mySlides fade">
            <img src="hitman.jpeg">
        </div>

        <div class="mySlides fade">
            <img src="tour.jpeg">
        </div>

        <a class="prev" onclick="plusSlides(-1)">❮</a>
        <a class="next" onclick="plusSlides(1)">❯</a>
    </div>

    <!-- Mobile Games -->
    <section>
        <h1>MOBILE GAMES</h1>
        <div class="image-gallery">
            <figure>
                <a href="batman.html">
                    <img src="batman.jpg" height="250">
                </a>
                <figcaption>BATMAN: THE TELLTALE SERIES</figcaption>
            </figure>

            <figure>
                <img src="hitman2.jpeg" height="250">
                <figcaption>HITMAN 2</figcaption>
            </figure>

            <figure>
                <img src="motalxl.jpg" height="250">
                <figcaption>MORTAL KOMBAT XL</figcaption>
            </figure>

            <figure>
                <img src="lego.jpeg" height="250">
                <figcaption>LEGO: STAR WARS</figcaption>
            </figure>
        </div>
    </section>

    <!-- Related Apps -->
    <section>
        <h1>RELATED APPS</h1>
        <div class="image-gallery">
            <figure>
                <img src="dcinfinite.png" height="250">
                <figcaption>DC INFINITE</figcaption>
            </figure>

            <figure>
                <img src="studiotour.jpg" height="250">
                <figcaption>WB STUDIO TOUR</figcaption>
            </figure>

            <figure>
                <img src="adultswim.jpeg" height="250">
                <figcaption>ADULT SWIM</figcaption>
            </figure>

            <figure>
                <img src="cnarcade.jpeg" height="250">
                <figcaption>CARTOON NETWORK ARCADE</figcaption>
            </figure>
        </div>
    </section>

    <!-- Slideshow Script -->
    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");

            if (n > slides.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = slides.length }

            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }

            slides[slideIndex - 1].style.display = "block";
        }
    </script>

    <!-- Footer -->
    <footer>
        <div class="social-media-links">
            <a href="https://www.youtube.com/user/WarnerBrosPictures/">
                <img src="youtube-logo.png">
            </a>
            <a href="https://www.facebook.com/warnerbrosent/">
                <img src="facebook-logo.png">
            </a>
            <a href="https://twitter.com/Warnerbros/">
                <img src="twitter-logo.png">
            </a>
            <a href="https://www.instagram.com/warnerbrosentertainment/">
                <img src="instagram-logo.png">
            </a>
        </div>
    </footer>

</body>
</html>
